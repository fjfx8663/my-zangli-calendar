name: Update Zangli Calendar

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 1 1 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependency
        run: python -m pip install tyme4py

      - name: Generate calendar
        run: python generate_ics.py

      - name: Commit generated calendar
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add zangli.ics
          if git diff --cached --quiet; then
            echo "No calendar changes to commit"
          else
            git commit -m "Auto update zangli.ics"
            git push
          fi
